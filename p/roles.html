<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Role Master</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #eaeaf4;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .main-container { width: 100%; max-width: 620px; }
        .card {
            background: #ffffff;
            border: 2px solid #c8bfea;
            border-radius: 18px;
            padding: 25px 35px;
            margin-bottom: 20px;
        }
        .title-box {
            background: #9b5fd4;
            color: #ffffff;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .subtitle-box {
            background: #5c25b0;
            color: #ffffff;
            width: fit-content;
            min-width: 240px;
            text-align: center;
            margin: 0 auto 22px auto;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
        }
        .info-banner {
            display: none;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .info-banner.show    { display: block; }
        .info-banner.warning { background: #fff8e1; color: #8a5a00; border: 1px solid #f0c36d; }
        .info-banner.success { background: #e9f7ef; color: #1f7a3f; border: 1px solid #9fe0b8; }
        .info-banner.error   { background: #feecea; color: #a8201f; border: 1px solid #f4b2b0; }
        .field-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 18px;
        }
        .field-row.narrow-id .field-col { max-width: 160px; }
        .field-label {
            width: 130px;
            font-size: 15px;
            font-weight: 600;
            padding-top: 10px;
            color: #222;
            flex-shrink: 0;
        }
        .field-label.required::after { content: " *"; color: #e03030; font-weight: 700; }
        .field-col { flex: 1; }
        .inp {
            width: 100%;
            background: #ede9f8;
            border: 2px solid #cfc5ee;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: 0.2s;
        }
        .inp:focus   { border-color: #7c4cbf; }
        .inp.error   { border-color: #dc3545; background: #fff3f3; }
        .inp.success { border-color: #28a745; background: #f2fff6; }
        .inp:disabled { background: #f0eefb; color: #777; cursor: not-allowed; }
        #roleId { width: 100px; }
        #roleName { width: 280px; }
        #description { width: 320px; }
        #status { width: 180px; }
        select.inp { cursor: pointer; }
        textarea.inp { resize: vertical; }
        .err-msg { display: none; margin-top: 5px; color: #dc3545; font-size: 12px; }
        .err-msg.show { display: block; }
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            min-width: 90px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover  { opacity: 0.9; }
        .btn:active { transform: scale(0.97); }
        .btn-new    { background: #6366f1; }
        .btn-save   { background: #27a96b; }
        .btn-update { background: #2563eb; }
        .btn-prev   { background: #0ea5e9; }
        .btn-next   { background: #e8960f; }
        .btn-exit   { background: #e03030; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 8px;
        }
        .badge-active   { background: #e9f7ef; color: #1f7a3f; border: 1px solid #9fe0b8; }
        .badge-inactive { background: #feecea; color: #a8201f; border: 1px solid #f4b2b0; }
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(19,15,48,0.55);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 24px;
        }
        .modal.show { display: flex; }
        .modal-content {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
        }
        .modal-content p { font-size: 16px; color: #242424; margin-bottom: 20px; }
        .modal-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        @media (max-width: 768px) {
            .field-row { flex-direction: column; }
            .field-label { width: 100%; padding-top: 0; }
            .field-row.narrow-id .field-col { max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="main-container">

    <div class="card">
    <div class="title-box">Time Table Management System</div>
    <div class="subtitle-box">Role Master</div>

        <div class="info-banner" id="infoBanner"></div>

        <!-- Role ID -->
        <div class="field-row narrow-id">
            <div class="field-label required">Role ID</div>
            <div class="field-col">
                <input class="inp" id="roleId" type="number" />
                <div class="err-msg" id="roleIdErr">Role ID is required.</div>
            </div>
        </div>

        <!-- Role Name -->
        <div class="field-row">
            <div class="field-label required">Role Name</div>
            <div class="field-col">
                <input class="inp" id="roleName" type="text" maxlength="50" />
                <div class="err-msg" id="roleNameErr">Please enter the role name.</div>
            </div>
        </div>

        <!-- Description -->
        <div class="field-row">
            <div class="field-label required">Description</div>
            <div class="field-col">
                <textarea class="inp" id="description" rows="3"
                          maxlength="200"
                          style="resize:vertical;"></textarea>
                <div class="err-msg" id="descriptionErr">Please enter a description for this role.</div>
            </div>
        </div>

        <!-- Status -->
        <div class="field-row">
            <div class="field-label required">Status</div>
            <div class="field-col">
                <select class="inp" id="status">
                    <option value="">-- Select Status --</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
                <div class="err-msg" id="statusErr">Please select a status.</div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="btn-row">
            <button class="btn btn-new" id="btnNew" onclick="resetForm()">New</button>
            <button class="btn btn-save" id="btnSave" onclick="saveRecord()">Save</button>
            <button class="btn btn-update" id="btnUpdate" onclick="updateRecord()" style="display: none;">Update</button>
            <button class="btn btn-prev" id="btnPrev" onclick="handlePrev()">Previous</button>
            <button class="btn btn-next" id="btnNext" onclick="handleNext()">Next</button>
            <button class="btn btn-exit" id="btnExit" onclick="showExitModal()">Exit</button>
        </div>
    </div>
    </div>

</div>



<!-- Exit Confirm Modal -->
<div class="modal" id="exitModal">
    <div class="modal-content">
        <p>Are you sure you want to exit? Any unsaved data will be lost.</p>
        <div class="modal-actions">
            <button class="btn btn-exit"   onclick="confirmExit()">Yes, Exit</button>
            <button class="btn btn-update" onclick="closeExitModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let records      = [];
    let currentIndex = -1;
    let editingIndex = -1;

    async function fetchRecords() {
        try {
            const res = await fetch('/api/roles');
            if (!res.ok) throw new Error('Failed to fetch roles');
            records = await res.json();
            document.getElementById('roleId').value = getNextID();
            updateButtonState();
        } catch (err) {
            showBanner('Error loading records: ' + err.message, 'error');
        }
    }

    function getNextID() {
        return records.length === 0 ? 1 : Math.max(...records.map(r => r.id)) + 1;
    }

    function getField(id) { return document.getElementById(id).value.trim(); }
    function setField(id, val) { document.getElementById(id).value = val ?? ''; }

    function updateButtonState() {
        const val = parseInt(document.getElementById('roleId').value);
        const matchIndex = records.findIndex(r => r.id === val);
        if (matchIndex !== -1) {
            document.getElementById('btnSave').style.display = 'none';
            document.getElementById('btnUpdate').style.display = 'inline-block';
            editingIndex = matchIndex;
            currentIndex = matchIndex;
        } else {
            document.getElementById('btnSave').style.display = 'inline-block';
            document.getElementById('btnUpdate').style.display = 'none';
            editingIndex = -1;
        }
    }

    // Event listener for ID manual entry
    document.getElementById('roleId').addEventListener('input', function() {
        const val = parseInt(this.value);
        if (isNaN(val)) {
            editingIndex = -1;
            document.getElementById('btnSave').style.display = 'inline-block';
            document.getElementById('btnUpdate').style.display = 'none';
            return;
        }
        const matchIndex = records.findIndex(r => r.id === val);
        if (matchIndex !== -1) {
            const rec = records[matchIndex];
            setField('roleName', rec.roleName);
            setField('description', rec.description);
            setField('status', rec.status);
            editingIndex = matchIndex;
            currentIndex = matchIndex;
            document.getElementById('btnSave').style.display = 'none';
            document.getElementById('btnUpdate').style.display = 'inline-block';
            showBanner(`Record with ID ${val} already exists. Loaded for editing.`, 'warning');
            clearErrors();
        } else {
            editingIndex = -1;
            document.getElementById('btnSave').style.display = 'inline-block';
            document.getElementById('btnUpdate').style.display = 'none';
        }
    });

    function showBanner(msg, type) {
        const b = document.getElementById('infoBanner');
        b.textContent = msg;
        b.className = 'info-banner show ' + type;
        setTimeout(() => { b.className = 'info-banner'; }, 4500);
    }

    function clearErrors() {
        ['roleName','description','status'].forEach(id => {
            document.getElementById(id).classList.remove('error','success');
        });
        ['roleNameErr','descriptionErr','statusErr'].forEach(id => {
            document.getElementById(id).classList.remove('show');
        });
    }

    function validate() {
        let valid = true;
        const fields = [
            { id: 'roleName',    errId: 'roleNameErr',    msg: 'Please enter the role name.' },
            { id: 'description', errId: 'descriptionErr', msg: 'Please enter a description for this role.' },
            { id: 'status',      errId: 'statusErr',      msg: 'Please select a status.' },
        ];
        fields.forEach(({ id, errId, msg }) => {
            const val = getField(id);
            const inp = document.getElementById(id);
            const err = document.getElementById(errId);
            err.textContent = msg;
            if (!val) {
                inp.classList.add('error'); inp.classList.remove('success');
                err.classList.add('show');
                valid = false;
            } else {
                inp.classList.remove('error'); inp.classList.add('success');
                err.classList.remove('show');
            }
        });
        return valid;
    }

    function buildRecord() {
        return {
            id:          parseInt(document.getElementById('roleId').value) || getNextID(),
            roleName:    getField('roleName'),
            description: getField('description'),
            status:      getField('status')
        };
    }

    function resetForm() {
        document.getElementById('roleName').value    = '';
        document.getElementById('description').value = '';
        document.getElementById('status').value      = '';
        document.getElementById('roleId').value      = getNextID();
        updateButtonState();
        editingIndex = -1;
        currentIndex = -1;
        clearErrors();
    }

    function loadRecord(index) {
        if (index < 0 || index >= records.length) return;
        const rec = records[index];
        document.getElementById('roleId').value      = rec.id;
        document.getElementById('roleName').value    = rec.roleName;
        document.getElementById('description').value = rec.description;
        document.getElementById('status').value      = rec.status;
        editingIndex = index;
        currentIndex = index;
        document.getElementById('btnSave').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'inline-block';
        clearErrors();
    }

    async function saveRecord() {
        if (!validate()) { showBanner('Please fill in all required fields before saving.', 'error'); return; }
        const rec = buildRecord();
        try {
            const res = await fetch('/api/roles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(rec)
            });
            if (!res.ok) throw new Error(await res.text());
            const saved = await res.json();
            showBanner(`Role "${saved.roleName}" has been saved successfully!`, 'success');
            await fetchRecords();
            resetForm();
        } catch (err) {
            showBanner('Error saving record: ' + err.message, 'error');
        }
    }

    async function updateRecord() {
        if (!validate()) { showBanner('Please fill in all required fields before updating.', 'error'); return; }
        const rec = buildRecord();
        try {
            const res = await fetch(`/api/roles/${rec.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(rec)
            });
            if (!res.ok) throw new Error(await res.text());
            const updated = await res.json();
            showBanner(`Role "${updated.roleName}" has been updated successfully!`, 'success');
            await fetchRecords();
            resetForm();
        } catch (err) {
            showBanner('Error updating record: ' + err.message, 'error');
        }
    }

    function handlePrev() {
        if (records.length === 0) {
            showBanner('No records available.', 'warning');
            return;
        }
        if (currentIndex > 0) {
            loadRecord(currentIndex - 1);
        } else if (currentIndex === 0) {
            showBanner('You are at the first record.', 'warning');
        } else {
            loadRecord(records.length - 1);
        }
    }

    function handleNext() {
        if (records.length === 0) {
            showBanner('No records available.', 'warning');
            return;
        }
        if (currentIndex < records.length - 1) {
            loadRecord(currentIndex + 1);
        } else {
            resetForm();
            showBanner('You have reached the last record. Ready for new entry.', 'warning');
        }
    }

    function showExitModal()  { document.getElementById('exitModal').classList.add('show'); }
    function closeExitModal() { document.getElementById('exitModal').classList.remove('show'); }
    function confirmExit()    { document.getElementById('exitModal').classList.remove('show'); showBanner('Form session ended. Thank you!', 'warning'); }

    // Init
    fetchRecords();
</script>
</body>
</html>
